services:
  mysql:
    image: mysql:8.0
    container_name: tiktok-mod-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-tiktok_mod}
      MYSQL_USER: ${MYSQL_USER:-tiktok}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-tiktokpass}
    ports:
      - "7777:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
